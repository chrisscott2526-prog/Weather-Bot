name: Poll weather stations

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run poller
        run: python poller.py

      - name: Commit the log
        run: |
          git config user.name "weather-bot"
          git config user.email "bot@users.noreply.github.com"
          git add temps_log.csv daily_highs.csv
          git diff --cached --quiet || git commit -m "temps $(date -u +'%H:%M')"
          git push
