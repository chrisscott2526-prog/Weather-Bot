name: Place trades

on:
  schedule:
    - cron: "35 1,3,5,13,15,17,19,21,23 * * *"
  workflow_run:
    workflows: ["Scan Kalshi markets"]
    types: [completed]
  workflow_dispatch:



permissions:
  contents: write

jobs:
  trade:
      

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Install crypto library
        run: pip install cryptography

      - name: Place orders
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python trader.py

      - name: Commit the log
        run: |
          git config user.name "weather-bot"
          git config user.email "bot@users.noreply.github.com"
          git add trades.csv
          git diff --cached --quiet || git commit -m "trades $(date -u +'%F %H:%M')"
          git pull --rebase
          git push
