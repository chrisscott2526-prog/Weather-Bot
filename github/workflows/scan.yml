name: Scan Kalshi markets

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install crypto library
        run: pip install cryptography

      - name: Scan markets
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python scanner.py

      - name: Commit the log
        run: |
          git config user.name "weather-bot"
          git config user.email "bot@users.noreply.github.com"
          git add edges.csv
          git diff --cached --quiet || git commit -m "scan $(date -u +'%F %H:%M')"
          git push
